; Asterisk REST Interface (ARI). Пользователь должен совпадать с ASTERISK_ARI_USER / ASTERISK_ARI_PASSWORD в .env приложения.

[general]
enabled = yes
; allowed_origins: в закрытой Docker-сети можно оставить пустым или * для отладки
allowed_origins = *

; Имя секции = логин ARI (HTTP Basic и параметр api_key в WebSocket).
[voiceai]
type = user
read_only = no
password = voiceai_secret
password_format = plain
