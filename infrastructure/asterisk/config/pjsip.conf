; PJSIP: транк к оператору (MCN.ru). Подставьте реальные значения вместо TODO.
; Документация провайдера: хост регистрации, логин/пароль, разрешённые кодеки (обычно ulaw/alaw).

[global]
type=global
user_agent=VoiceAI-Asterisk-Docker

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; # TODO: при необходимости укажите external_media_address / external_signaling_address — публичный IP VPS для NAT.

; --- Исходящая регистрация на MCN (если требуется) ---
[mcn-auth]
type=auth
auth_type=userpass
; # TODO: замените на логин SIP от MCN.ru
username=SIP_USERNAME
; # TODO: замените на пароль SIP от MCN.ru
password=SIP_PASSWORD

[mcn-aor]
type=aor
; # TODO: замените на хост/IP сервера MCN (из личного кабинета), например sip.mcn.ru
contact=sip:MCN_SIP_HOST:5060
qualify_frequency=60

[mcn-endpoint]
type=endpoint
context=mcn-inbound
disallow=all
allow=ulaw
allow=alaw
; # TODO: совпадает с username, если провайдер так требует
from_user=SIP_USERNAME
from_domain=MCN_SIP_HOST
outbound_auth=mcn-auth
aors=mcn-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

; --- Привязка входящих INVITE с IP оператора к endpoint (подставьте диапазон/адрес MCN) ---
[mcn-identify]
type=identify
endpoint=mcn-endpoint
; # TODO: замените на IP-адрес или подсеть SIP-серверов MCN.ru (поле match=)
match=MCN_OPERATOR_SIP_IP
