; Простой dialplan: ответ на входящий и передача в Stasis-приложение ARI (имя = voice_ai_app).

[general]
static=yes
writeprotect=no
clearglobalvars=no

[mcn-inbound]
; Входящие с транка MCN (контекст должен совпадать с endpoint в pjsip.conf).
exten => _X.,1,NoOp(=== Входящий с транка, передача в ARI voice_ai_app ===)
 same => n,Answer()
 same => n,Stasis(voice_ai_app)
 same => n,Hangup()
