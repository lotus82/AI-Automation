# Продакшен-стек без Asterisk: API, Celery, Postgres, Redis, Nginx+SPA.
#
# Подготовка:
#   1) Скопируйте .env.example → .env и задайте POSTGRES_PASSWORD, ключи API и т.д.
#   2) Соберите и запустите:
#        docker compose -f docker-compose.prod.yml up -d --build
#
# Панель: http://<ваш-ip>:80  (TLS — на хосте через Caddy/Certbot + прокси на :80 или на публикуйте 443).
# Postgres/Redis не проброшены наружу — только внутренняя сеть Compose.
#
# Телефония: поднимайте отдельно docker-compose.yml с asterisk или свой SIP; при необходимости
# задайте в .env ASTERISK_URL, ASTERISK_ARI_USER, ASTERISK_ARI_PASSWORD.

name: sales-ai-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задайте POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:-sales_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Saratov}
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-sales}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_agent}
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHAT_MEMORY_TTL_SECONDS: ${CHAT_MEMORY_TTL_SECONDS:-86400}
      VOICE_STT_PROVIDER: ${VOICE_STT_PROVIDER:-salutespeech}
      VOICE_TTS_PROVIDER: ${VOICE_TTS_PROVIDER:-salutespeech}
      CALL_RECORDINGS_DIR: /app/data/recordings
    volumes:
      - recordings_data:/app/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      - uvicorn
      - src.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Saratov}
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-sales}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_agent}
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CALL_RECORDINGS_DIR: /app/data/recordings
    volumes:
      - recordings_data:/app/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      - celery
      - -A
      - src.core.celery_app
      - worker
      - --loglevel=info

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Saratov}
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-sales}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_agent}
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_started
    command:
      - celery
      - -A
      - src.core.celery_app
      - beat
      - --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      - web

volumes:
  postgres_data:
  recordings_data:
