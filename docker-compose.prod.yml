# Продакшен-стек без Asterisk: API, Celery, Postgres, Redis, Nginx+SPA.
#
# Только собрать образ панели (без Node на хосте, не нужен POSTGRES в .env):
#   docker compose -f docker-compose.frontend.yml build
#   # или в составе полного стека:
#   docker compose -f docker-compose.prod.yml build frontend
#
# Подготовка полного запуска:
#   1) Скопируйте .env.example → .env и задайте POSTGRES_PASSWORD, ключи API и т.д.
#   2) Соберите и запустите:
#        docker compose -f docker-compose.prod.yml up -d --build
#
# Панель (контейнер frontend): по умолчанию 127.0.0.1:8080 — снаружи слушает Nginx на хосте (Ubuntu)
# с TLS (Certbot) и proxy_pass на http://127.0.0.1:8080. Прямой доступ без хостового Nginx:
#   FRONTEND_BIND=0.0.0.0 FRONTEND_HTTP_PORT=80 docker compose -f docker-compose.prod.yml up -d
# Postgres/Redis не проброшены наружу — только внутренняя сеть Compose.
#
# Телефония: поднимайте отдельно docker-compose.yml с asterisk или свой SIP; при необходимости
# задайте в .env ASTERISK_URL, ASTERISK_ARI_USER, ASTERISK_ARI_PASSWORD.

name: sales-ai-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sales}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задайте POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:-sales_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Saratov}
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-sales}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_agent}
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHAT_MEMORY_TTL_SECONDS: ${CHAT_MEMORY_TTL_SECONDS:-86400}
      VOICE_STT_PROVIDER: ${VOICE_STT_PROVIDER:-salutespeech}
      VOICE_TTS_PROVIDER: ${VOICE_TTS_PROVIDER:-salutespeech}
      CALL_RECORDINGS_DIR: /app/data/recordings
      SHOP_UPLOAD_DIR: /app/data/shop_uploads
      SITE_UPLOAD_DIR: /app/data/site_uploads
    volumes:
      - recordings_data:/app/data/recordings
      - shop_uploads_data:/app/data/shop_uploads
      - site_uploads_data:/app/data/site_uploads
      # Панель «Логи» (ADMIN_LOGS_TOKEN): только read-only, см. README по безопасности
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    command:
      - uvicorn
      - src.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Saratov}
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-sales}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_agent}
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CALL_RECORDINGS_DIR: /app/data/recordings
    volumes:
      - recordings_data:/app/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      - celery
      - -A
      - src.core.celery_app
      - worker
      - --loglevel=info

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Saratov}
      POSTGRES_URI: postgresql+asyncpg://${POSTGRES_USER:-sales}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_agent}
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_started
    command:
      - celery
      - -A
      - src.core.celery_app
      - beat
      - --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    image: ${FRONTEND_IMAGE:-sales-ai-frontend:latest}
    restart: unless-stopped
    ports:
      # FRONTEND_BIND: 127.0.0.1 — только локальный Nginx+Certbot; 0.0.0.0 — публикация порта на все интерфейсы
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_HTTP_PORT:-8080}:80"
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  recordings_data:
  shop_uploads_data:
  site_uploads_data:
