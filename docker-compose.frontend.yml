# Только сборка образа панели (Nginx + Vite SPA). Node.js на хосте не нужен.
#
# Из корня репозитория:
#   docker compose -f docker-compose.frontend.yml build
#
# Имя образа по умолчанию: sales-ai-frontend:latest
# Свой тег / registry:
#   FRONTEND_IMAGE=registry.example.com/myorg/sales-ui:v1 docker compose -f docker-compose.frontend.yml build
#
# Запуск только фронта (API не поднимется — /api даст 502, для проверки статики ок):
#   docker compose -f docker-compose.frontend.yml up -d
#   FRONTEND_HTTP_PORT=8080 docker compose -f docker-compose.frontend.yml up -d

name: sales-ai-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    image: ${FRONTEND_IMAGE:-sales-ai-frontend:latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
