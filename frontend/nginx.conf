worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    server {
        listen 80;
        server_name localhost;
        
        # Директория, куда копируется собранный фронтенд (папка dist)
        root /usr/share/nginx/html;
        index index.html;

        # Разрешаем Битриксу открывать наш сайт в iframe (CSP)
        # Указываем доменные зоны Битрикс24 (ru, com, by, kz и т.д.)
        add_header Content-Security-Policy "frame-ancestors 'self' *.bitrix24.ru *.bitrix24.com *.bitrix24.by *.bitrix24.kz;";
        
        # Гарантированно удаляем X-Frame-Options, если он был установлен ранее,
        # так как он конфликтует с iframe Битрикса
        proxy_hide_header X-Frame-Options;

        # Не кэшировать shell SPA: иначе после деплоя браузер держит старый index.html и старые имена чанков.
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # Маршрутизация для React/Vue SPA (Single Page Application)
        # Если запрашиваемого файла нет, отдаем index.html, чтобы роутер фронтенда сам разобрался
        location / {
            try_files $uri $uri/ /index.html;
        }

        # REST API бэкенда (FastAPI под префиксом /api), в т.ч. POST /api/max/webhook → web:8000
        # По умолчанию у Nginx client_max_body_size = 1m — без этого загрузки (Читатель, база знаний) дают 413.
        location /api/ {
            client_max_body_size 50m;
            proxy_pass http://web:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Явно пробрасываем все кастомные заголовки (X-Bitrix-Domain, X-Bitrix-App-Sid и т.д.)
            proxy_pass_request_headers on;
        }

        # TODO (MAX Messenger): платформа доставки вебхуков MAX строго требует HTTPS (порт 443) и доверенный
        # SSL-сертификат (например Let's Encrypt). На порту 80 или с самоподписанным сертификатом вызовы могут
        # не доставляться или обрываться без явной диагностики со стороны MAX.

        # Мониторинг чат-ботов: WebSocket /api/ws/monitoring
        location /api/ws/ {
            proxy_pass http://web:8000/api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Голос: WebSocket и совместимый HTTP-апгрейд
        location /voice/ {
            proxy_pass http://web:8000/voice/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}