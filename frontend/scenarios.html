<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Сценарии тренажёра — Sales AI</title>
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>
  <div class="dashboard">
    <aside class="dashboard__sidebar">
      <div class="dashboard__brand">Sales AI — панель</div>
      <nav>
        <ul class="nav">
          <li class="nav__item">
            <a class="nav__link" href="/" data-nav="home">Главная</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="/settings.html" data-nav="settings">Настройки</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="/telephony.html" data-nav="telephony">Телефония</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="/scenarios.html" data-nav="scenarios">Сценарии тренажёра</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="/tester.html" data-nav="tester">Тест ИИ-агента</a>
          </li>
        </ul>
      </nav>
    </aside>
    <main class="dashboard__main">
      <h1 class="dashboard__title">Сценарии тренажёра</h1>
      <p class="dashboard__lead">
        РОП создаёт персону ИИ-клиента и список возражений. Менеджер отрабатывает их в голосовом тестере (режим «Тренажёр»).
      </p>

      <!-- TODO: Добавить редактирование и удаление сценариев, разграничение прав по ролям. -->
      <h2 class="dashboard__title" style="font-size:1.1rem;">Новый сценарий</h2>
      <form id="scenario-form" class="voice-tester" style="max-width:40rem;">
        <div class="voice-tester__field">
          <label class="voice-tester__label" for="sc-title">Название</label>
          <input class="voice-tester__input" id="sc-title" name="title" required maxlength="512" placeholder="Кратко, для списка" />
        </div>
        <div class="voice-tester__field">
          <label class="voice-tester__label" for="sc-persona">Персона клиента (системный промпт)</label>
          <textarea class="voice-tester__input" id="sc-persona" name="client_persona_prompt" required rows="6" style="min-height:8rem;resize:vertical;" placeholder="Кто клиент, тон, цели, ограничения…"></textarea>
        </div>
        <div class="voice-tester__field">
          <label class="voice-tester__label" for="sc-objections">Возражения и линии для отработки</label>
          <textarea class="voice-tester__input" id="sc-objections" name="objections_to_raise" required rows="5" style="min-height:6rem;resize:vertical;" placeholder="По пунктам: сроки, цена, качество…"></textarea>
        </div>
        <div class="voice-tester__row">
          <button type="submit" class="btn btn--primary btn--lg" id="btn-save-scenario">Сохранить</button>
        </div>
        <p id="scenario-form-msg" class="dashboard__lead" style="margin-top:1rem;"></p>
      </form>

      <h2 class="dashboard__title" style="font-size:1.1rem;margin-top:2rem;">Существующие сценарии</h2>
      <div id="scenario-list" class="placeholder">Загрузка…</div>
    </main>
  </div>
  <script src="/static/js/scenarios_app.js"></script>
</body>
</html>
