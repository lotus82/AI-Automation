# Локальная инфраструктура: API, фронт (Vite dev + HMR на :8080), PostgreSQL (pgvector), Redis, Asterisk (SIP + ARI).

services:
  asterisk:
    build:
      context: .
      dockerfile: infrastructure/asterisk/Dockerfile
    env_file:
      - .env
    environment:
      # pjsip.conf собирается из шаблона при старте (см. infrastructure/asterisk/docker-entrypoint.sh)
      SIP_SERVER_IP: ${SIP_SERVER_IP:-127.0.0.1}
      SIP_OPERATOR_IP: ${SIP_OPERATOR_IP:-}
      SIP_USER: ${SIP_USER:-}
      SIP_PASSWORD: ${SIP_PASSWORD:-}
    # Точечный монтаж конфигов сохраняет файлы по умолчанию образа (logger, modules и т.д.).
    # pjsip.conf не монтируется — генерируется из pjsip.conf.template в entrypoint.
    volumes:
      - ./infrastructure/asterisk/config/http.conf:/etc/asterisk/http.conf:ro
      - ./infrastructure/asterisk/config/ari.conf:/etc/asterisk/ari.conf:ro
      - ./infrastructure/asterisk/config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./infrastructure/asterisk/config/rtp.conf:/etc/asterisk/rtp.conf:ro
    ports:
      - "5060:5060/udp"
      - "8088:8088"
      - "10000-10500:10000-10500/udp"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -u voiceai:voiceai_secret http://127.0.0.1:8088/ari/api-docs/resources.json -o /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - default

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "8000"
    # Опционально: раскомментируйте для прямого доступа к FastAPI с хоста (без Nginx)
    # ports:
    #   - "8000:8000"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_TIMEZONE: Europe/Saratov
      POSTGRES_URI: postgresql+asyncpg://sales:sales@postgres:5432/sales_agent
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHAT_MEMORY_TTL_SECONDS: "86400"
      # Голос SaluteSpeech вместо Deepgram (ключ — в .env или на settings.html):
      VOICE_STT_PROVIDER: salutespeech
      VOICE_TTS_PROVIDER: salutespeech
      # ARI (тот же хост, что в ASTERISK_URL; из контейнера web — сервис asterisk)
      ASTERISK_URL: http://asterisk:8088/ari
      ASTERISK_ARI_USER: voiceai
      ASTERISK_ARI_PASSWORD: voiceai_secret
      ASTERISK_STASIS_APP: voice_ai_app
      # Куда Asterisk шлёт RTP externalMedia (имя сервиса Docker)
      ASTERISK_RTP_ADVERTISE_HOST: web
      ASTERISK_RTP_PORT_MIN: "18000"
      ASTERISK_RTP_PORT_MAX: "18015"
      CALL_RECORDINGS_DIR: /app/data/recordings
      SHOP_UPLOAD_DIR: /app/data/shop_uploads
      SITE_UPLOAD_DIR: /app/data/site_uploads
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./data/recordings:/app/data/recordings
      - ./data/shop_uploads:/app/data/shop_uploads
      - ./data/site_uploads:/app/data/site_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      asterisk:
        condition: service_healthy
    command:
      [
        "uvicorn",
        "src.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB: sales_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d sales_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: development
      APP_TIMEZONE: Europe/Saratov
      POSTGRES_URI: postgresql+asyncpg://sales:sales@postgres:5432/sales_agent
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CALL_RECORDINGS_DIR: /app/data/recordings
    volumes:
      - ./src:/app/src
      - ./data/recordings:/app/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      [
        "celery",
        "-A",
        "src.core.celery_app",
        "worker",
        "--loglevel=info",
      ]

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: development
      APP_TIMEZONE: Europe/Saratov
      POSTGRES_URI: postgresql+asyncpg://sales:sales@postgres:5432/sales_agent
      REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_started
    command:
      [
        "celery",
        "-A",
        "src.core.celery_app",
        "beat",
        "--loglevel=info",
      ]

  # Vite dev server + HMR: код монтируется с хоста, node_modules — в анонимном томе.
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend/spa:/app
      - /app/node_modules
    ports:
      - "8080:5173"
    depends_on:
      - web
    environment:
      # Прокси /api и /voice на API в сети Compose (локально без Docker — см. vite.config.js)
      VITE_PROXY_TARGET: http://web:8000
      # Браузер открывает localhost:8080 → WebSocket HMR должен идти на тот же порт
      VITE_HMR_CLIENT_PORT: "8080"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
